<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Allowance Calculator | Till</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&family=Lato:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      * { box-sizing: border-box; }
      html {
        background: transparent;
      }
      body {
        margin: 0;
        background: transparent;
        font-family: 'Nunito', 'Varela Round', 'Trebuchet MS', Arial, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      #root {
        background: transparent;
      }
      .btn-primary:hover { filter: brightness(0.93); transform: translateY(-1px); }
      .btn-primary:active { filter: brightness(0.87); transform: translateY(0); }
      .btn-ghost:hover { opacity: 0.65; }
      .btn-back:hover { opacity: 0.65; }
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 6px;
        border-radius: 3px;
        outline: none;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: linear-gradient(166deg, #25B8E8 11.772%, #1E94CF 51.924%, #634AEF 92.075%);
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(99,74,239,0.35);
        border: 3px solid #fff;
      }
      input[type="range"]::-moz-range-thumb {
        width: 24px;
        height: 24px;
        border-radius: 50%;
        background: linear-gradient(166deg, #25B8E8 11.772%, #1E94CF 51.924%, #634AEF 92.075%);
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(99,74,239,0.35);
        border: 3px solid #fff;
      }
    </style>
    <script>
      // ResizeObserver for Webflow iframe height sync
      setTimeout(function() {
        var ro = new ResizeObserver(function() {
          window.parent.postMessage(
            { type: 'resize', height: document.body.scrollHeight },
            '*'
          )
        })
        ro.observe(document.body)
        window.parent.postMessage(
          { type: 'resize', height: document.body.scrollHeight },
          '*'
        )
      }, 150)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
